<style>
        body {
            font-family: 'Roboto Flex', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom floating label logic */
        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            transform: translateY(-24px) scale(0.85);
            background-color: white;
            padding: 0 4px;
            color: #0058bd;
        }
        .input-group input:focus {
            border-width: 2px;
            border-color: #0058bd;
        }
    </style>
</head>
<body class="bg-surface selection:bg-primary-fixed selection:text-on-primary-fixed min-h-screen flex flex-col items-center justify-center p-md">
<!-- Main Authentication Container -->
<main class="w-full max-w-[448px] bg-white rounded-[24px] border border-outline-variant p-xl md:p-xl flex flex-col items-center shadow-[0_2px_10px_rgba(0,0,0,0.08)] relative overflow-hidden">
<!-- Linear Progress Indicator (Hidden by default, shown during transitions) -->
<div class="absolute top-0 left-0 w-full h-[4px] bg-primary-fixed overflow-hidden opacity-0 transition-opacity duration-300" id="progress-bar">
<div class="h-full bg-primary animate-[progress_2s_infinite_linear] origin-left"></div>
</div>
<style>
            @keyframes progress {
                0% { transform: translateX(-100%) scaleX(0.2); }
                50% { transform: translateX(0%) scaleX(0.5); }
                100% { transform: translateX(100%) scaleX(0.2); }
            }
        </style>
<!-- Brand Identity -->
<div class="mb-lg pt-sm">
<!-- Google Logo SVG -->
<svg aria-hidden="true" class="h-6 w-auto" viewbox="0 0 74 24">
<path d="M9.24 4.83c-.76-.11-1.52-.16-2.28-.16-3.81 0-6.96 3.12-6.96 6.96s3.15 6.96 6.96 6.96c2.4 0 3.75-1.12 4.41-2.24l-2.07-1.15c-.48.77-1.12 1.34-2.34 1.34-1.34 0-2.34-.69-2.82-1.93l6.98-2.89-.31-.76c-.57-1.51-2.2-3.88-5.01-3.88zm-.13 3.96l-4.52 1.87c-.24-.65-.12-1.32.32-1.83.43-.5 1.07-.79 1.76-.79 1.02 0 1.95.53 2.44 1.45v-.7zM24 10V2h-2v3.2C20.7 3.5 18.6 2 16 2c-4.4 0-8 3.6-8 8s3.6 8 8 8c2.6 0 4.7-1.5 6-3.2V18h2v-8zm-8 6c-3.3 0-6-2.7-6-6s2.7-6 6-6 6 2.7 6 6-2.7 6-6 6zm17-14h-2v16h2V2zm13 8c0-4.4-3.6-8-8-8s-8 3.6-8 8 3.6 8 8 8 8-3.6 8-8zm-8 6c-3.3 0-6-2.7-6-6s2.7-6 6-6 6 2.7 6 6-2.7 6-6 6zm18-6c0-4.4-3.6-8-8-8-2.6 0-4.7 1.5-6 3.2V2h-2v16h2v-5.2c1.3 1.7 3.4 3.2 6 3.2 4.4 0 8-3.6 8-8zm-8 6c-3.3 0-6-2.7-6-6s2.7-6 6-6 6 2.7 6 6-2.7 6-6 6zM69 10V2h-2v11.5c-1.3-1.4-3.4-2.5-6-2.5-4.4 0-8 3.6-8 8s3.6 8 8 8c2.6 0 4.7-1.1 6-2.5V18h2v-8zm-8 6c-3.3 0-6-2.7-6-6s2.7-6 6-6 6 2.7 6 6-2.7 6-6 6z" fill="#4285F4"></path>
</svg>
</div>
<!-- Typography Header -->
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-sm">Sign in</h1>
<p class="font-body-lg text-body-lg text-on-surface mb-xl">Use your Google Account</p>
<!-- Form Section -->
<form class="w-full flex flex-col gap-xl" id="login-form" onsubmit="return false;">
<div class="relative input-group">
<input autocomplete="email" class="w-full h-[56px] px-md pt-sm pb-xs border border-outline rounded-lg text-on-surface font-body-lg focus:outline-none transition-all peer bg-transparent" id="email-input" placeholder=" " required="" type="email"/>
<label class="absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant font-body-lg transition-all pointer-events-none peer-focus:text-primary" for="email-input">
                    Email or phone
                </label>
</div>
<div>
<button class="text-primary font-label-lg hover:bg-surface-container-low px-base py-xs rounded transition-colors -ml-base" type="button">
                    Forgot email?
                </button>
</div>
<div class="mt-md">
<p class="text-on-surface-variant font-body-md leading-relaxed">
                    Not your computer? Use Guest mode to sign in privately.
                    <a class="text-primary font-label-lg ml-xs hover:underline" href="#">Learn more about using Guest mode</a>
</p>
</div>
<!-- Action Cluster -->
<div class="flex items-center justify-between mt-xl">
<button class="text-primary font-label-lg px-md h-[40px] flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors active:bg-surface-container-high" type="button">
                    Create account
                </button>
<button class="bg-primary text-on-primary font-label-lg px-lg h-[40px] flex items-center justify-center rounded-full hover:bg-primary-container transition-all active:opacity-90 shadow-sm" id="next-button" onclick="simulateLoading()" type="submit">
                    Next
                </button>
</div>
</form>
</main>
<!-- Shared Footer -->
<footer class="fixed bottom-0 w-full flex flex-wrap justify-between items-center px-lg py-md max-w-[448px] mx-auto left-0 right-0 font-label-md text-label-md text-on-surface-variant bg-transparent">
<div class="flex items-center gap-md">
<span class="cursor-pointer hover:text-on-surface transition-colors flex items-center gap-xs">
                English (United States)
                <span class="material-symbols-outlined text-[16px]">arrow_drop_down</span>
</span>
</div>
<div class="flex gap-lg">
<a class="hover:text-on-surface dark:hover:text-on-surface underline transition-all duration-200" href="#">Help</a>
<a class="hover:text-on-surface dark:hover:text-on-surface underline transition-all duration-200" href="#">Privacy</a>
<a class="hover:text-on-surface dark:hover:text-on-surface underline transition-all duration-200" href="#">Terms</a>
</div>
</footer>
<script>
        function simulateLoading() {
            const btn = document.getElementById('next-button');
            const bar = document.getElementById('progress-bar');
            const input = document.getElementById('email-input');
            
            if (input.value.trim() !== "") {
                bar.style.opacity = '1';
                btn.disabled = true;
                btn.style.opacity = '0.7';
                btn.innerText = 'Checking...';
                
                setTimeout(() => {
                    bar.style.opacity = '0';
                    btn.disabled = false;
                    btn.style.opacity = '1';
                    btn.innerText = 'Next';
                }, 1500);
            }
        }

        // Language dropdown mock interaction
        document.querySelector('.material-symbols-outlined').parentElement.addEventListener('click', () => {
            console.log('Language selector triggered');
        });
    </script>
</body></html>
